            padding: 0.7rem;
            text-align: center;
            color: #4a3728;
        }
        .card:hover {

            box-shadow: 0 4px 12px rgba(150, 100, 50, 0.12);
        }
        .card:active { transform: scale(0.96); }
        .card .emoji { font-size: 1.3rem; margin-bottom: 0.2rem; }
        .card .name { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
        .card .count {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.5);
            padding: 0.05rem 0.45rem;
            border-radius: 99px;
            margin-top: 0.15rem;

        .warm-3  { background: #fed7aa; }  .warm-4  { background: #fde68a; }

        .warm-13 { background: #ffe0b2; }  .warm-14 { background: #f8bbd0; }
        .warm-15 { background: #ffecb3; }

        /* ======= 详情页视图 ======= */

        #detailView.visible { display: block; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: none;
            border: 1px solid #e0c8b0;
            border-radius: 8px;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            color: #7a5a40;
            margin-bottom: 1.5rem;
            transition: background 0.15s;
        }
        .back-btn:hover { background: #f0e0d0; }

        .detail-header {
            margin-bottom: 1.5rem;
        }
        .detail-header h2 {
            font-size: 1.5rem;
            color: #6b4a2e;
        }
        .detail-header .sub {
            color: #a0765a;
            font-size: 0.9rem;
        }

        .detail-list { list-style: none; }
        .detail-list li {
            background: #fffaf2;
            border: 1px solid #f0d5b8;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;

            font-size: 0.85rem;
            margin-left: 0.3rem;

            background: #fff5ea;

            padding: 3rem 0 1rem;
            color: #a0765a;

const grid = document.getElementById('grid');
const gridView = document.getElementById('gridView');
const detailView = document.getElementById('detailView');
const detailTitle = document.getElementById('detailTitle');
const detailSub = document.getElementById('detailSub');
const detailList = document.getElementById('detailList');

// 生成网格卡片
data.forEach((section, i) => {
  const card = document.createElement('div');
  card.className = `card warm-${(i % 15) + 1}`;
  card.innerHTML = `
    <div class="emoji">${section.emoji}</div>
    <div class="name">${section.name}</div>
    <div class="count">${section.count} 条</div>
  `;
  card.addEventListener('click', () => showDetail(i));
  grid.appendChild(card);
});

// 切换到详情页
function showDetail(i) {
  const section = data[i];
  detailTitle.textContent = section.name;
  detailSub.textContent = `共 ${section.count} 条 · 点击返回可回到索引`;

  detailList.innerHTML = '';
  section.items.forEach(item => {
    const li = document.createElement('li');
    const idx = item.indexOf(' — ');
    if (idx > 0) {
      li.innerHTML = `<strong>${item.slice(0, idx)}</strong><span class="desc">${item.slice(idx)}</span>`;
    } else {
      li.textContent = item;
    }
    detailList.appendChild(li);
  });

  gridView.style.display = 'none';
  detailView.classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 返回网格
function showGrid() {
  detailView.classList.remove('visible');
  gridView.style.display = 'block';
}
